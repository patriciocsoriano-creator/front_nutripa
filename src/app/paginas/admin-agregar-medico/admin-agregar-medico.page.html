<ion-header>
  <ion-toolbar color="success">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/administrador"></ion-back-button>
    </ion-buttons>
    <ion-title>Agregar Médico</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-card>
    <ion-card-header>
      <ion-card-title>Datos del Médico</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-item>
        <ion-label position="stacked">Nombre *</ion-label>
        <ion-input [(ngModel)]="form.nombre" placeholder="Nombre"></ion-input>
      </ion-item>
      
      <ion-item>
        <ion-label position="stacked">Apellido *</ion-label>
        <ion-input [(ngModel)]="form.apellido" placeholder="Apellido"></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="stacked">Cédula *</ion-label>
        <ion-input [(ngModel)]="form.cedula" type="tel" maxlength="10" placeholder="10 dígitos"></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="stacked">Correo *</ion-label>
        <ion-input [(ngModel)]="form.correo" type="email" placeholder="correo@ejemplo.com"></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="stacked">Teléfono</ion-label>
        <ion-input [(ngModel)]="form.telefono" type="tel" maxlength="10" placeholder="0991234567"></ion-input>
      </ion-item>

      <ion-item>
        <ion-label>Especialidad *</ion-label>
        <ion-select [(ngModel)]="form.especialidad" placeholder="Seleccione">
          <ion-select-option *ngFor="let e of especialidades" [value]="e">{{e}}</ion-select-option>
        </ion-select>
      </ion-item>

      <ion-item>
        <ion-label position="stacked">Contraseña *</ion-label>
        <ion-input [(ngModel)]="form.password" type="password"></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="stacked">Confirmar Contraseña *</ion-label>
        <ion-input [(ngModel)]="form.confirmarPassword" type="password"></ion-input>
      </ion-item>

      <ion-button expand="block" (click)="guardarMedico()" class="ion-margin-top">
        <ion-icon slot="start" name="save-outline"></ion-icon>
        Guardar Médico
      </ion-button>
    </ion-card-content>
  </ion-card>
</ion-content>
